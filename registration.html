<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration Form</title>
   <style>
.navbar {
    background-color: #2c3e50;
    padding: 15px;
    text-align: center;
}

.navbar a {
    color: white;
    text-decoration: none;
    margin: 15px;
    font-weight: bold;
}

.navbar a:hover {
    color: #f1c40f;
}

/* Active Page Highlight */
.active {
    border-bottom: 3px solid yellow;
}
</style>
</head>
<body>
    <nav class="navbar">
    <a href="index.html" class="nav-link">Home</a>
    <a href="schedule.html" class="nav-link">Schedule</a>
    <a href="navigation.html" class="nav-link">Navigation</a>
</nav>


<div class="container">
    <h2>Student Registration Form</h2>

    <form>
        
        <label>Full Name:</label>
        <input type="text" name="name" required>
        <label>Registration Number:</label>
        <input type="text" name="reg_no" required>
        <label>Email:</label>
        <input type="email" name="email" required>
        <label>Password:</label>
        <input type="password" name="password" required>
        <label>Select Course:</label>
        <select name="course">
            <option value="">--Select Course--</option>
            <option>Computer Science</option>
            <option>Software Engineering</option>
            <option>Electrical Engineering</option>
            <option>Mechanical Engineering</option>
        </select>
        <div class="radio-group">
            <label>Semester:</label><br>
            <input type="radio" name="semester" value="1"> Semester 1<br>
            <input type="radio" name="semester" value="2"> Semester 2<br>
            <input type="radio" name="semester" value="3"> Semester 3<br>
        </div>
        <div class="checkbox-group">
            <input type="checkbox" required> I agree to the terms and conditions
        </div>
        <button type="submit">Register</button>
    </form>
</div>

<p style="text-align:center;">
    <a href="index.html">← Back to Home</a>
</p>
</body>
</html>
